    cross_origin_authentication: false
    custom_login_page_on: true
    description: >+
      This application was created through the management API, and this
      description was written with the Application Manager script

    grant_types:
      - authorization_code
      - implicit
      - refresh_token
      - client_credentials
    is_first_party: true
    is_token_endpoint_ip_header_trusted: false
    jwt_configuration:
      lifetime_in_seconds: 36000
      secret_encoded: false
    oidc_conformant: false
    refresh_token:
      expiration_type: non-expiring

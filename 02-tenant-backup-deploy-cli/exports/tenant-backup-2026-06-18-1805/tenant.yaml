      fail_open: false
      secret: '##CAPTCHA_ARKOSE_SECRET##'
  suspiciousIpThrottling:
    enabled: true
    shields:
      - admin_notification
      - block
    allowlist: []
    stage:
      pre-login:
        max_attempts: 100
        rate: 864000
      pre-user-registration:
        max_attempts: 50
        rate: 1200
      pre-custom-token-exchange:
        max_attempts: 10
        rate: 600000

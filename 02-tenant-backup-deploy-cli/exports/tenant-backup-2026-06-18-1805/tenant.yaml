databases:
  - name: OkbTestDatabase
    strategy: auth0
    authentication:
      active: true
    connected_accounts:
      active: false
    enabled_clients:
      - Dmb Login
      - Tenant Import CLI
    is_domain_connection: true
    options:
      mfa:
        active: true
        return_enroll_settings: true
      attributes:
        email:
          signup:
            status: required
            verification:
              active: true
          unique: true
          identifier:
            active: true
          profile_required: true
          verification_method: otp
        username:
          signup:
            status: required
          identifier:
            active: true
          validation:
            max_length: 15
            min_length: 1
            allowed_types:
              email: true
              phone_number: false
          profile_required: true
      import_mode: false
      disable_signup: false
      passwordPolicy: good
      passkey_options:
        challenge_ui: both
        local_enrollment_enabled: true
        progressive_enrollment_enabled: true
      password_history:
        size: 5
        enable: true
      strategy_version: 2
      password_dictionary:
        enable: false
        dictionary: []
      authentication_methods:
        passkey:
          enabled: false
        password:
          enabled: true
          api_behavior: required
          signup_behavior: allow
      brute_force_protection: true
      password_no_personal_info:
        enable: false
      password_complexity_options:
        min_length: 8
      enabledDatabaseCustomization: false
    realms:
      - OkbTestDatabase
  - name: Username-Password-Authentication
    strategy: auth0
    authentication:
      active: true
    connected_accounts:
      active: false
    enabled_clients:
      - Default App
      - Tenant Import CLI
      - test app
    is_domain_connection: false
    options:
      mfa:
        active: true
        return_enroll_settings: true
      validation:
        username:
          max: 15
          min: 1
      import_mode: false
      passwordPolicy: good
      passkey_options:
        challenge_ui: both
        local_enrollment_enabled: true
        progressive_enrollment_enabled: true
      password_history:
        size: 5
        enable: false
      strategy_version: 2
      requires_username: true
      password_dictionary:
        enable: false
        dictionary: []
      authentication_methods:
        passkey:
          enabled: false
        password:
          enabled: true
          api_behavior: required
          signup_behavior: allow
      brute_force_protection: true
      password_no_personal_info:
        enable: false
      password_complexity_options:
        min_length: 8
      enabledDatabaseCustomization: false
    realms:
      - Username-Password-Authentication
